name: Linux CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linux-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Ubuntu 24.04 · GCC · Qt 6
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            g++ \
            pkg-config \
            qt6-base-dev \
            libudev-dev \
            libhidapi-dev \
            libevdev-dev

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DRODAVARION_BUILD_TESTS=ON
          -DRODAVARION_WARNINGS_AS_ERRORS=OFF

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure
