name: Publish release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-release:
    name: Create verified source archives
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag and project version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [[ "$tag_version" != "$file_version" ]]; then
            echo "Tag version ($tag_version) does not match VERSION ($file_version)."
            exit 1
          fi

      - name: Create source archives
        shell: bash
        run: |
          set -euo pipefail
          project="Rodavarion_TDriver-${GITHUB_REF_NAME}"
          mkdir -p dist
          git archive --format=tar.gz --prefix="$project/" -o "dist/$project.tar.gz" HEAD
          git archive --format=zip --prefix="$project/" -o "dist/$project.zip" HEAD
          cd dist
          sha256sum "$project.tar.gz" "$project.zip" > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            dist/* \
            --title "Rodavarion TDriver ${GITHUB_REF_NAME#v} Stable" \
            --notes-file RELEASE_NOTES_1.0.0.md \
            --verify-tag \
            --latest
